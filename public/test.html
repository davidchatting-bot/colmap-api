<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>colmap-api test</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { font-size: 1.2rem; color: #aaa; }
    input[type="file"] { margin: 16px 0; }
    button { padding: 8px 20px; background: #333; color: #eee; border: 1px solid #555; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    #previews { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    #previews img { width: 120px; height: 80px; object-fit: cover; border: 1px solid #333; }
    #log { margin-top: 24px; background: #1a1a1a; border: 1px solid #333; padding: 16px; min-height: 100px; white-space: pre-wrap; font-size: 0.85rem; color: #0f0; }
    #result { margin-top: 16px; background: #1a1a1a; border: 1px solid #333; padding: 16px; white-space: pre-wrap; font-size: 0.8rem; color: #8ef; display: none; }
  </style>
</head>
<body>
  <h1>colmap-api / camera pose test</h1>

  <input type="file" id="picker" multiple accept="image/*">
  <div id="previews"></div>
  <button id="btn" disabled>Run COLMAP</button>

  <div id="log">Waiting...</div>
  <div id="result"></div>

  <script type="module">
    const API = '/colmap'

    const picker   = document.getElementById('picker')
    const btn      = document.getElementById('btn')
    const previews = document.getElementById('previews')
    const log      = document.getElementById('log')
    const result   = document.getElementById('result')

    let files = []

    picker.addEventListener('change', () => {
      files = Array.from(picker.files)
      previews.innerHTML = ''
      files.forEach(f => {
        const img = document.createElement('img')
        img.src = URL.createObjectURL(f)
        previews.appendChild(img)
      })
      btn.disabled = files.length < 2
      log.textContent = `${files.length} image(s) selected. Click Run COLMAP.`
      result.style.display = 'none'
    })

    btn.addEventListener('click', async () => {
      btn.disabled = true
      result.style.display = 'none'
      log.textContent = 'Uploading images...\n'

      try {
        // Build FormData from files
        const form = new FormData()
        files.forEach(f => form.append('images', f, f.name))

        // POST job
        const res = await fetch(`${API}/jobs`, { method: 'POST', body: form })
        const { jobId, error } = await res.json()
        if (error) throw new Error(error)

        log.textContent += `Job ID: ${jobId}\nConnecting...\n`

        // WebSocket progress
        await new Promise((resolve, reject) => {
          const ws = new WebSocket(`wss://${location.host}/colmap/jobs/${jobId}/ws`)

          ws.onmessage = ({ data }) => {
            const msg = JSON.parse(data)
            const job = msg.job

            if (job.progress?.stage) {
              log.textContent += `[${job.progress.stage}] ${job.progress.log ?? ''}\n`
              log.scrollTop = log.scrollHeight
            }

            if (job.status === 'done') {
              ws.close()
              resolve(job.result)
            } else if (job.status === 'error') {
              ws.close()
              reject(new Error(job.error))
            }
          }

          ws.onerror = () => reject(new Error('WebSocket error'))
        }).then(r => {
          log.textContent += '\nDone!\n'
          result.style.display = 'block'
          result.textContent = JSON.stringify(r, null, 2)
        })

      } catch (err) {
        log.textContent += `\nError: ${err.message}`
      } finally {
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
